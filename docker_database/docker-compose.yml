services:
  postgres:
    image: postgres:16-alpine
    container_name: trackealo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trackealo
      POSTGRES_PASSWORD: trackealo
      POSTGRES_DB: trackealo
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: